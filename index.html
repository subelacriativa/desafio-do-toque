<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Dado do Amor ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe3e3 0%, #fbc2eb 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px; /* Reduzido de 20px para economizar espaço */
            box-sizing: border-box;
            overflow: hidden;
        }

        h1 {
            color: #d63031;
            text-align: center;
            margin-top: 5px;
            margin-bottom: 2px; /* Margens bem enxutas */
            font-size: 24px; /* Levemente menor para telas mobile */
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        p {
            color: #4a4a4a;
            text-align: center;
            margin-top: 0;
            margin-bottom: 5px; /* Reduzido de 20px para não empurrar o jogo para baixo */
            font-size: 14px;
        }

        #tela-inicial {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffe3e3 0%, #fbc2eb 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .btn-principal {
            background-color: #d63031;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(214, 48, 49, 0.4);
            transition: transform 0.2s;
        }

        .btn-principal:hover {
            transform: scale(1.05);
        }

        #conteudo-jogo {
            display: none; 
            width: 100%;
            max-width: 420px;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
            justify-content: space-between;
        }

        /* Área de lançamento do dado - Altura reduzida para dar espaço ao texto */
        .arena-dado {
            width: 100%;
            height: 260px; /* Reduzido de 350px para segurar o dado mais acima */
            display: flex;
            align-items: flex-end;
            justify-content: center;
            position: relative;
            perspective: 1000px;
            touch-action: none;
            user-select: none;
            padding-bottom: 10px; /* Menos folga no fundo */
        }

        /* Container de Translação (Sobe e Desce) */
        .dado-wrapper {
            position: absolute;
            bottom: 10px;
            transition: transform 0s linear;
            cursor: grab;
        }
        .dado-wrapper:active {
            cursor: grabbing;
        }

        /* O Dado 3D Real - Ajustado levemente para 90px */
        .dado {
            width: 90px;
            height: 90px;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(25deg);
            transition: transform 0s linear;
        }

        /* Propriedades comuns de todas as faces */
        .face {
            position: absolute;
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #ff7675 0%, #d63031 100%);
            border: 3px solid #ffffff;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
            box-sizing: border-box;
            backface-visibility: visible;
        }

        /* Posicionamento Espacial 3D das Faces (metade do tamanho do dado: 45px) */
        .face-1 { transform: rotateY(0deg) translateZ(45px); }
        .face-2 { transform: rotateY(90deg) translateZ(45px); }
        .face-3 { transform: rotateY(180deg) translateZ(45px); }
        .face-4 { transform: rotateY(-90deg) translateZ(45px); }
        .face-5 { transform: rotateX(90deg) translateZ(45px); }
        .face-6 { transform: rotateX(-90deg) translateZ(45px); }

        /* Caixa de Exibição do Desafio Sorteado */
        #resultado {
            margin-bottom: 10px; /* Menor margem inferior */
            min-height: 60px;
            background-color: white;
            border: 3px solid #ff7675;
            border-radius: 15px;
            padding: 10px 15px;
            width: 90%;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 16px; /* Ajuste leve no texto */
            font-weight: bold;
            color: #2d3436;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .ganhou {
            transform: scale(1.05);
            animation: pulsar 0.5s ease alternate infinite;
        }

        @keyframes pulsar {
            from { border-color: #ff7675; }
            to { border-color: #d63031; box-shadow: 0 4px 15px rgba(214, 48, 49, 0.3); }
        }
    </style>
</head>
<body>

    <audio id="musica-fundo" loop preload="auto" src="JeTAime.mp3"></audio>
    <audio id="som-clique" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav"></audio>

    <div id="tela-inicial">
        <h1 style="margin-bottom: 25px;">Prontos para jogar o dado? ❤️</h1>
        <button class="btn-principal" onclick="iniciarJogo()">Começar</button>
    </div>

    <div id="conteudo-jogo">
        <div>
            <h1>Dado do Amor ❤️</h1>
            <p>Arraste o dado de baixo para cima rápido para jogá-lo!</p>
        </div>
        
        <div class="arena-dado" id="arena">
            <div class="dado-wrapper" id="dadoWrapper">
                <div class="dado" id="dado">
                    <div class="face face-1">❤️</div>
                    <div class="face face-2">🔥</div>
                    <div class="face face-3">💋</div>
                    <div class="face face-4">🤫</div>
                    <div class="face face-5">🥂</div>
                    <div class="face face-6">💆‍♂️</div>
                </div>
            </div>
        </div>

        <div id="resultado">Jogue o dado para cima para começar... 🎲</div>
    </div>

    <script>
        const desafios = {
            1: "Tire uma peça de roupa 🔞",
            2: "Posição: Do jeitinho que você mais gosta 🔥",
            3: "Dê um beijo de cinema de 30 segundos 💋",
            4: "Fique sem falar por 1 minuto enquanto ganha carinho 🤫",
            5: "Tome um gole da sua bebida 🥂",
            6: "Me faça uma massagem de 3 minutos 💆‍♂️"
        };

        const rotacoesFaces = {
            1: { x: 0, y: 0 },
            2: { x: 0, y: -90 },
            3: { x: 0, y: 180 },
            4: { x: 0, y: 90 },
            5: { x: -90, y: 0 },
            6: { x: 90, y: 0 }
        };

        const dado = document.getElementById('dado');
        const dadoWrapper = document.getElementById('dadoWrapper');
        const arena = document.getElementById('arena');
        const resultadoDiv = document.getElementById('resultado');
        const musicaFundo = document.getElementById('musica-fundo');
        const somClique = document.getElementById('som-clique');

        musicaFundo.volume = 0.3;
        somClique.volume = 0.6;

        let estaArrastando = false;
        let yInicial = 0;
        let tempoInicial = 0;
        let jogando = false;

        function iniciarJogo() {
            document.getElementById('tela-inicial').style.display = 'none';
            document.getElementById('conteudo-jogo').style.display = 'flex';
            tocarMusica();
            registrarEventos();
        }

        function tocarMusica() {
            musicaFundo.play().catch(() => {
                document.addEventListener('click', function triggerAudio() {
                    musicaFundo.play();
                    document.removeEventListener('click', triggerAudio);
                }, { once: true });
            });
        }

        function registrarEventos() {
            const obtenerY = (e) => e.touches ? e.touches[0].clientY : e.clientY;

            const iniciarArrasto = (e) => {
                if (jogando) return;
                estaArrastando = true;
                yInicial = obtenerY(e);
                tempoInicial = Date.now();
                resultadoDiv.classList.remove('ganhou');
                resultadoDiv.innerText = "Lançando... 🚀";
            };

            const movendoArrasto = (e) => {
                if (!estaArrastando || jogando) return;
                const yAtual = obtenerY(e);
                const deslocamentoY = yInicial - yAtual;

                if (deslocamentoY > 0 && deslocamentoY < 60) {
                    dadoWrapper.style.transform = `translateY(${-deslocamentoY}px)`;
                }
            };

            const finalizarArrasto = (e) => {
                if (!estaArrastando || jogando) return;
                estaArrastando = false;

                const yFinal = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
                const deslocamentoTotal = yInicial - yFinal;
                const tempoTotal = Date.now() - tempoInicial;

                if (deslocamentoTotal > 30 && tempoTotal < 250) {
                    lancarDado(deslocamentoTotal / tempoTotal);
                } else {
                    dadoWrapper.style.transition = "transform 0.2s ease-out";
                    dadoWrapper.style.transform = "translateY(0px)";
                    resultadoDiv.innerText = "Arraste mais rápido para o alto! 🎲";
                    setTimeout(() => { dadoWrapper.style.transition = "none"; }, 200);
                }
            };

            arena.addEventListener('mousedown', iniciarArrasto);
            window.addEventListener('mousemove', movendoArrasto);
            window.addEventListener('mouseup', finalizarArrasto);

            arena.addEventListener('touchstart', iniciarArrasto, { passive: true });
            arena.addEventListener('touchmove', movendoArrasto, { passive: true });
            window.addEventListener('touchend', finalizarArrasto);
        }

        function lancarDado(forca) {
            jogando = true;
            
            const faceSorteada = Math.floor(Math.random() * 6) + 1;
            
            // Altura máxima do pulo reduzida para 170px para não estourar telas pequenas
            const alturaPulo = Math.min(170, Math.max(110, forca * 100));
            const tempoVoo = 800; 

            dadoWrapper.style.transition = `transform ${tempoVoo}ms cubic-bezier(0.25, 1, 0.5, 1)`;
            dado.style.transition = `transform ${tempoVoo}ms cubic-bezier(0.2, 0.8, 0.4, 1)`;

            dadoWrapper.style.transform = `translateY(${-alturaPulo}px)`;

            const voltasX = (Math.floor(Math.random() * 4) + 3) * 360;
            const voltasY = (Math.floor(Math.random() * 4) + 3) * 360;
            const rotFinal = rotacoesFaces[faceSorteada];

            dado.style.transform = `rotateX(${voltasX + rotFinal.x}deg) rotateY(${voltasY + rotFinal.y}deg)`;

            let somInterval = setInterval(() => {
                somClique.currentTime = 0;
                somClique.play().catch(() => {});
            }, 120);

            setTimeout(() => {
                dadoWrapper.style.transition = `transform ${tempoVoo / 2}ms cubic-bezier(0.55, 0.055, 0.675, 0.19)`;
                dadoWrapper.style.transform = `translateY(0px)`;
            }, tempoVoo / 2);

            setTimeout(() => {
                clearInterval(somInterval);
                
                somClique.currentTime = 0;
                somClique.play().catch(() => {});

                resultadoDiv.innerText = desafios[faceSorteada];
                resultadoDiv.classList.add('ganhou');

                jogando = false;
                dadoWrapper.style.transition = "none";
                dado.style.transition = "none";

                dado.style.transform = `rotateX(${rotFinal.x}deg) rotateY(${rotFinal.y}deg)`;
            }, tempoVoo);
        }
    </script>
</body>
</html>
