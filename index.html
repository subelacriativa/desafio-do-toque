<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio do Toque ❤️</title>
    <!-- Biblioteca Canvas-Confetti para o efeito especial da zona Hot -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe3e3 0%, #fbc2eb 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        h1 {
            color: #d63031;
            text-align: center;
            margin-bottom: 5px;
            font-size: 26px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        p {
            color: #4a4a4a;
            text-align: center;
            margin-bottom: 20px;
            font-size: 16px;
        }

        #tela-inicial {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffe3e3 0%, #fbc2eb 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .btn-principal {
            background-color: #d63031;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(214, 48, 49, 0.4);
            transition: transform 0.2s;
        }

        .btn-principal:hover {
            transform: scale(1.05);
        }

        #conteudo-jogo {
            display: none; 
            width: 100%;
            max-width: 420px;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Container do Termômetro Vertical */
        .termometro-container {
            position: relative;
            width: 90px;
            height: 340px;
            background-color: rgba(255, 255, 255, 0.6);
            border: 4px solid #ff7675;
            border-radius: 50px;
            margin: 20px auto;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            align-items: flex-end; /* Garante que a barra suba de baixo para cima */
        }

        /* Barra interna que oscila */
        #barra-energia {
            width: 100%;
            height: 0%; /* Controlado pelo JS */
            background: linear-gradient(to top, #ff7675, #d63031, #b32424);
            /* Ajustado para acompanhar o tempo do setInterval de forma suave */
            transition: height 0.03s linear; 
        }

        /* Marcadores visuais das zonas de pontuação */
        .marcador-zona {
            position: absolute;
            left: 0;
            width: 100%;
            border-top: 2px dashed rgba(255, 255, 255, 0.6);
            color: white;
            font-size: 11px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            box-sizing: border-box;
            padding-left: 10px;
            pointer-events: none;
        }

        /* Caixa de Resultado do Desafio */
        #resultado {
            margin-top: 25px;
            min-height: 60px;
            background-color: white;
            border: 3px solid #ff7675;
            border-radius: 15px;
            padding: 15px;
            width: 85%;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #2d3436;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .ganhou {
            transform: scale(1.05);
            animation: pulsar 0.5s ease alternate infinite;
        }

        @keyframes pulsar {
            from { border-color: #ff7675; }
            to { border-color: #d63031; box-shadow: 0 4px 15px rgba(214, 48, 49, 0.3); }
        }

        /* Espaço para o botão de ação */
        .area-botoes {
            margin-top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

    <audio id="musica-fundo" loop preload="auto" src="JeTAime.mp3"></audio>
    <audio id="som-clique" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav"></audio>

    <div id="tela-inicial">
        <h1 style="margin-bottom: 25px;">Prontos para o teste de reflexo? ❤️</h1>
        <button class="btn-principal" onclick="iniciarJogo()">Começar</button>
    </div>

    <div id="conteudo-jogo">
        <h1>Desafio do Toque ❤️</h1>
        <p>Aperte PARAR no momento certo para subir a temperatura!</p>
        
        <div class="termometro-container">
            <!-- Barra dinâmica -->
            <div id="barra-energia"></div>

            <!-- Indicações de níveis na tela -->
            <div class="marcador-zona" style="bottom: 81%; height: 19%; background-color: rgba(214, 48, 49, 0.15);">🔥 HOT (81-100%)</div>
            <div class="marcador-zona" style="bottom: 31%; height: 50%; background-color: rgba(255, 118, 117, 0.1);">😏 MORNO (31-80%)</div>
            <div class="marcador-zona" style="bottom: 0%; height: 31%;">❄️ FRIO (0-30%)</div>
        </div>

        <div class="area-botoes">
            <button id="btn-acao" class="btn-principal" onclick="controlarJogo()">PARAR</button>
        </div>

        <div id="resultado">Clique em PARAR para descobrir o seu destino... 🔥</div>
    </div>

    <script>
        // Bancos de dados de desafios categorizados por temperatura
        const desafiosFrio = [
            "Dê um abraço apertado de 30 segundos 🤗",
            "Faça um carinho leve no rosto do seu amor 💖",
            "Beijo na testa cheio de carinho 🥺",
            "Massagem rápida nos ombros (1 min) 💆‍♂️"
        ];

        const desafiosMorno = [
            "Dê um beijo de cinema caprichado (30s) 💋",
            "Sussurre um desejo secreto no ouvido 💬",
            "Tome um gole da sua bebida preferida 🥂",
            "Uma lambida provocante no pescoço 😉"
        ];

        const desafiosHot = [
            "Tire uma peça de roupa imediatamente! 🔞",
            "Fiquem de conchinha sacana por 2 minutes 🔥",
            "Escolha a posição que você mais gosta para mais tarde 🔞",
            "Uma massagem super provocante de 3 minutos 💆‍♀️"
        ];

        const barra = document.getElementById('barra-energia');
        const btnAcao = document.getElementById('btn-acao');
        const resultadoDiv = document.getElementById('resultado');
        const musicaFundo = document.getElementById('musica-fundo');
        const somClique = document.getElementById('som-clique');

        musicaFundo.volume = 0.3;
        somClique.volume = 0.6;

        let jogando = false;
        let porcentagemAtual = 0;
        let subindo = true;
        let intervaloFisica;
        
        // Controla a velocidade de oscilação da barra (quanto menor o número, mais rápido)
        const velocidadOscilacao = 15; 

        function iniciarJogo() {
            document.getElementById('tela-inicial').style.display = 'none';
            document.getElementById('conteudo-jogo').style.display = 'flex';
            
            tocarMusica();
            resetarCicloBarra();
        }

        function tocarMusica() {
            musicaFundo.play().catch(() => {
                document.addEventListener('click', function triggerAudio() {
                    musicaFundo.play();
                    document.removeEventListener('click', triggerAudio);
                }, { once: true });
            });
        }

        // Alterna o botão entre "PARAR" e "TENTAR DE NOVO"
        function controlarJogo() {
            // Vibração nativa no celular ao clicar (padrão de 100ms)
            if (navigator.vibrate) {
                navigator.vibrate(100);
            }

            // Toca o som mecânico de clique
            somClique.currentTime = 0;
            somClique.play().catch(() => {});

            if (jogando) {
                // Parar o jogo e computar resultado
                jogando = false;
                clearInterval(intervaloFisica);
                btnAcao.innerText = "JOGAR DE NOVO";
                exibirResultado(porcentagemAtual);
            } else {
                // Reiniciar a oscilação da barra
                resetarCicloBarra();
            }
        }

        // Inicia ou reinicia o loop de animação da barra de energia
        function resetarCicloBarra() {
            jogando = true;
            resultadoDiv.classList.remove('ganhou');
            resultadoDiv.innerText = "Calculando temperatura... 🔥";
            btnAcao.innerText = "PARAR";

            intervaloFisica = setInterval(() => {
                if (subindo) {
                    porcentagemAtual += 4; // Passos de subida mais visíveis
                    if (porcentagemAtual >= 100) {
                        porcentagemAtual = 100;
                        subindo = false;
                    }
                } else {
                    porcentagemAtual -= 4; // Passos de descida mais visíveis
                    if (porcentagemAtual <= 0) {
                        porcentagemAtual = 0;
                        subindo = true;
                    }
                }
                barra.style.height = porcentagemAtual + '%';
            }, velocidadOscilacao); // Corrigido o nome da variável aqui!
        }

        // Escolhe o desafio ideal com base na porcentagem exata que o jogador parou
        function exibirResultado(porcentagem) {
            let desafioSorteado = "";
            resultadoDiv.classList.add('ganhou');

            if (porcentagem <= 30) {
                // Zona Fria
                const indice = Math.floor(Math.random() * desafiosFrio.length);
                desafioSorteado = `[FRIO - ${porcentagem}%] ${desafiosFrio[indice]}`;
            } else if (porcentagem > 30 && porcentagem <= 80) {
                // Zona Morna
                const indice = Math.floor(Math.random() * desafiosMorno.length);
                desafioSorteado = `[MORNO - ${porcentagem}%] ${desafiosMorno[indice]}`;
            } else {
                // Zona Hot (81% a 100%)
                const indice = Math.floor(Math.random() * desafiosHot.length);
                desafioSorteado = `[🔥 HOT! - ${porcentagem}%] ${desafiosHot[indice]}`;
                
                // Dispara os confetes com as cores românticas do layout
                dispararConfetesEspeciais();
            }

            resultadoDiv.innerText = desafioSorteado;
        }

        // Função responsável pelo efeito visual do Canvas-Confetti
        function dispararConfetesEspeciais() {
            const coresConfeti = ['#ff7675', '#d63031', '#ff8a8a', '#ffffff'];
            
            // Explosão da esquerda
            confetti({
                particleCount: 50,
                angle: 60,
                spread: 55,
                origin: { x: 0, y: 0.8 },
                colors: coresConfeti
            });
            
            // Explosão da direita
            confetti({
                particleCount: 50,
                angle: 120,
                spread: 55,
                origin: { x: 1, y: 0.8 },
                colors: coresConfeti
            });
        }
    </script>
</body>
</html>
